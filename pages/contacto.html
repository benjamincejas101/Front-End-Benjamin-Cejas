<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="../style.css">    
    <title>Contacto - Talento Tech</title>
</head>
<body>

    <header class="site-header">
        <a href="../index.html" class="logo-container">
            <img src="../img/logo1.png" alt="Logo" class="logo">
        </a>
        <nav class="nav-container">
            <ul id="navbar">
                <li><a href="../index.html">Inicio</a></li>
                <li><a href="productos.html">Productos</a></li>
                <li><a href="contacto.html" class="active">Contacto</a></li>
                <li><a href="carrito.html">Carrito (<span id="cart-count">0</span>)</a></li>
            </ul>
        </nav>
    </header>

    <main class="hero-section">
        <div class="container contact-card">
            
            <div class="contact-column-form">
                <h1 class="text-gradient" style="font-size: 2.2rem; font-weight: 800; margin-bottom: 5px;">Contacto</h1>
                <p class="contact-subtitle">Escríbenos y te responderemos en la brevedad.</p>
                
                <form class="contact-form" onsubmit="enviarMensaje(event)">
                    <div class="form-group">
                        <label for="nombre">NOMBRE COMPLETO</label>
                        <input type="text" id="nombre" placeholder="Tu nombre..." required>
                    </div>
                    <div class="form-group">
                        <label for="email">CORREO ELECTRÓNICO</label>
                        <input type="email" id="email" placeholder="tu@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="mensaje">MENSAJE</label>
                        <textarea id="mensaje" rows="4" placeholder="¿En qué podemos ayudarte?..." required></textarea>
                    </div>
                    <button type="submit" class="btn-orange-submit">Enviar Mensaje</button>
                </form>
            </div>

            <div class="contact-column-info">
                <div class="info-graphics-container">
                    
                    <div class="info-item item-cyan">
                        <div class="info-icon">✉</div>
                        <span>soporte@tech.com</span>
                    </div>
                    
                    <div class="info-item item-blue">
                        <div class="info-icon">📞</div>
                        <span>+54 11 1234-5678</span>
                    </div>
                    
                    <div class="info-item item-orange">
                        <div class="info-icon">📍</div>
                        <span>Buenos Aires, Arg</span>
                    </div>

                    <div class="connection-line"></div>
                </div>
            </div>

        </div>
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 Talento Tech Ecommerce - Todos los derechos reservados.</p>
    </footer>

    <script>
        // Función simple para simular el envío del formulario
        function enviarMensaje(event) {
            event.preventDefault();
            const nombre = document.getElementById('nombre').value;
            alert(`¡Gracias por comunicarte, ${nombre}! Tu mensaje fue enviado con éxito.`);
            event.target.reset();
        }

        // Mantener el contador del carrito actualizado al navegar
        document.addEventListener('DOMContentLoaded', () => {
            const carrito = JSON.parse(localStorage.getItem('carrito')) || [];
            const total = carrito.reduce((acc, item) => acc + item.cantidad, 0);
            const contador = document.getElementById('cart-count');
            if (contador) contador.textContent = total;
        });
    </script>
</body>
</html>
