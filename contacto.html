<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">    
    <title>Contacto - Talento Tech</title>
</head>
<body>

    <header class="site-header">
        <a href="index.html" class="logo-container">
            <img src="img/logo1.png" alt="Logo" class="logo">
        </a>
        <nav class="nav-container">
            <ul id="navbar">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="productos.html">Productos</a></li>
                <li><a href="contacto.html" class="active">Contacto</a></li>
                <li><a href="carrito.html">Carrito (<span id="cart-count">0</span>)</a></li>
            </ul>
        </nav>
    </header>

   <main class="hero-section">
        <div class="container contact-card visual-contact-layout">
            
            <div class="contact-column-form">
                <h2>Ponete en <span class="text-gradient">Contacto</span></h2>
                <p class="contact-subtitle">Ponete en contacto semi-transparente.</p>
                
                <form action="#" method="POST" class="contact-form">
                    <div class="form-group">
                        <label for="nombre">Nombre Completo</label>
                        <input type="text" id="nombre" name="nombre" placeholder="Nombre Completo" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Correo Electrónico</label>
                        <input type="email" id="email" name="email" placeholder="Correo Electrónico" required>
                    </div>

                    <div class="form-group">
                        <label for="asunto">Asunto</label>
                        <input type="text" id="asunto" name="asunto" placeholder="Asunto" required>
                    </div>

                    <div class="form-group">
                        <label for="mensaje">Mensaje</label>
                        <textarea id="mensaje" name="mensaje" rows="4" placeholder="Mensaje" required></textarea>
                    </div>

                    <button type="submit" class="btn-orange-submit">Enviar Mensaje</button>
                </form>
            </div>

            <div class="contact-column-info">
                <div class="info-graphics-container">
                    <div class="info-item item-cyan">
                        <span class="info-icon">📞</span>
                        <p>Atención Telefónica</p>
                    </div>
                    <div class="info-item item-blue">
                        <span class="info-icon">✉️</span>
                        <p>Soporte por Mail</p>
                    </div>
                    <div class="info-item item-orange">
                        <span class="info-icon">📍</span>
                        <p>Nuestras Oficinas</p>
                    </div>
                    <svg class="connection-line" viewBox="0 0 100 100">
                        <path d="M20,20 Q80,20 50,50 T80,80" fill="none" stroke="url(#line-gradient)" stroke-width="3" stroke-dasharray="5,5"/>
                        <defs>
                            <linearGradient id="line-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#06b6d4" />
                                <stop offset="50%" stop-color="#2563eb" />
                                <stop offset="100%" stop-color="#ea580c" />
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
            </div>

        </div>
    </main>
